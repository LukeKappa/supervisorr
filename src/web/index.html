<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supervisorr Matrix</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; padding: 20px; }
        .card { background: #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #555; }
        .running { border-color: #2ecc71; }
        .stopped { border-color: #e74c3c; }
        .title { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        .info { font-size: 0.9em; color: #aaa; }
        #drop-zone {
            border: 2px dashed #555;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            background: #1a1a1a;
            color: #888;
            transition: all 0.2s;
        }
        #drop-zone.dragover {
            border-color: #2ecc71;
            background: #153320;
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <h1>Supervisorr Dashboard</h1>
    
    <div id="drop-zone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        Drag & Drop an Executable Here to Deploy
    </div>

    <div id="processes">Loading processes...</div>

    <script>
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
        }

        async function handleDrop(e) {
            e.preventDefault();
            const dropZone = document.getElementById('drop-zone');
            dropZone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (!file) return;

            dropZone.innerText = "Uploading " + file.name + "...";

            const formData = new FormData();
            formData.append("executable", file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (data.success) {
                    dropZone.innerText = "Drag & Drop an Executable Here to Deploy";
                    fetchStatus(); // immediate refresh
                } else {
                    dropZone.innerText = "Error: " + data.error;
                    setTimeout(() => { dropZone.innerText = "Drag & Drop an Executable Here to Deploy"; }, 3000);
                }
            } catch(e) {
                console.error(e);
                dropZone.innerText = "Upload failed!";
                setTimeout(() => { dropZone.innerText = "Drag & Drop an Executable Here to Deploy"; }, 3000);
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const container = document.getElementById('processes');
                container.innerHTML = '';
                
                if (data.length === 0) {
                    container.innerHTML = '<i>No processes configured.</i>';
                    return;
                }

                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card ' + (p.status.includes('Running') ? 'running' : 'stopped');
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div class="title">${p.name}</div>
                                <div class="info">Status: ${p.status} | Intent: ${p.intent}</div>
                            </div>
                            <div>
                                <button onclick="sendAction('start', '${p.name}')" style="background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Start</button>
                                <button onclick="sendAction('stop', '${p.name}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Stop</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {
                console.error(e);
            }
        }

        async function sendAction(action, target) {
            try {
                await fetch('/api/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, target })
                });
                fetchStatus();
            } catch(e) {
                console.error(e);
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
